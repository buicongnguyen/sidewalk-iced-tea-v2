<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ngoại tuyến — Trà Đá Vỉa Hè</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background: linear-gradient(180deg, #f2d7a5, #d98756);
        color: #24150c;
      }
      .card {
        max-width: 420px;
        margin: 16px;
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 245, 217, 0.96);
        box-shadow: 0 16px 32px rgba(51, 25, 10, 0.22);
        text-align: center;
      }
      button {
        margin-top: 14px;
        padding: 12px 22px;
        font: inherit;
        border: none;
        border-radius: 14px;
        color: #fff7ea;
        background: linear-gradient(180deg, #ff9e53, #d85d37);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Mất mạng rồi</h1>
      <p>Bản lưu của quán vẫn nằm an toàn trên máy. Nối mạng lại rồi mở quán tiếp nhé.</p>
      <button onclick="location.reload()">Thử lại</button>
    </div>
  </body>
</html>
