<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#c75b4a" />
    <title>Trà Đá Vỉa Hè — V2</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./public/icons/app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="game-shell">
        <section class="game-card">
          <div class="status-strip">
            <div class="status-chip">
              <span id="coins-value">0</span>
              <small>xu</small>
            </div>
            <div class="status-chip">
              <span id="score-value">0</span>
              <small>điểm</small>
            </div>
            <div class="status-chip">
              <span id="served-value">0</span>
              <small>đã bán</small>
            </div>
            <div class="status-chip">
              <span id="streak-value">—</span>
              <small>chuỗi</small>
            </div>
            <div class="status-chip">
              <span id="reputation-value">★★★☆☆</span>
              <small>uy tín</small>
            </div>
            <div class="status-chip status-chip--weather">
              <span id="day-value">Ngày 1</span>
              <span class="chip-divider"></span>
              <span id="weather-value">nắng ráo</span>
            </div>
          </div>

          <div class="playfield-frame">
            <canvas
              id="game-canvas"
              width="960"
              height="540"
              aria-label="Trò chơi quán trà đá vỉa hè"
            ></canvas>

            <div id="title-overlay" class="overlay">
              <div class="overlay-card">
                <p class="eyebrow" id="overlay-eyebrow">Phiên bản 2</p>
                <h1 id="overlay-title">Trà Đá Vỉa Hè</h1>
                <p id="overlay-copy">
                  Chạm vào bàn để ghi món. Quầy sẽ pha và em phục vụ sẽ bưng ra
                  tận bàn — đừng để khách chờ lâu nhé!
                </p>
                <div id="overlay-stats" class="overlay-stats hidden"></div>
                <div class="overlay-actions">
                  <button id="start-button" class="primary-button" type="button">
                    Mở quán
                  </button>
                  <button
                    id="install-button"
                    class="secondary-button hidden"
                    type="button"
                  >
                    Cài ứng dụng
                  </button>
                </div>
              </div>
            </div>

            <div id="offline-badge" class="mode-badge hidden">
              Chế độ ngoại tuyến
            </div>
            <div id="toast" class="toast hidden" aria-live="polite"></div>
          </div>

          <div class="control-panel">
            <div class="meta-row">
              <div class="meta-pill">
                <span class="meta-label">Bàn</span>
                <span id="tables-value">0 / 8</span>
              </div>
              <div class="meta-pill">
                <span class="meta-label">Nhịp</span>
                <span id="flow-value">0 bán / 0 lỡ</span>
              </div>
              <div class="meta-pill">
                <span class="meta-label">Ngoài phố</span>
                <span id="incident-value">yên ắng</span>
              </div>
              <div class="meta-pill">
                <span class="meta-label">Đồng hồ</span>
                <span id="clock-value">còn 2:30</span>
              </div>
              <div class="meta-pill">
                <span class="meta-label">Lưu máy</span>
                <span id="save-value">đang mở</span>
              </div>
            </div>

            <div class="action-grid">
              <button id="upgrade-brew" class="action-button" type="button">
                Pha nhanh<small>15 xu</small>
              </button>
              <button id="upgrade-waiter" class="action-button" type="button">
                Thêm nhân viên<small>45 xu</small>
              </button>
              <button id="upgrade-tray" class="action-button" type="button">
                Khay lớn<small>30 xu</small>
              </button>
              <button id="upgrade-umbrella" class="action-button" type="button">
                Ô che<small>25 xu</small>
              </button>
              <button id="upgrade-fans" class="action-button" type="button">
                Quạt mát<small>35 xu</small>
              </button>
              <button id="upgrade-marketing" class="action-button" type="button">
                Quảng cáo<small>20 xu</small>
              </button>
              <button id="pause-button" class="action-button" type="button">
                Tạm dừng<small>ngưng phục vụ</small>
              </button>
              <button id="sound-button" class="action-button" type="button">
                Âm thanh<small>đang bật</small>
              </button>
              <button id="reset-button" class="action-button danger-button" type="button">
                Xóa dữ liệu<small>làm lại từ đầu</small>
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
